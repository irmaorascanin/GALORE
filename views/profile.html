<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – GALORÉ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: #111;
      color: white;
    }

    nav {
      height: 80px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .logo {
      color: #111;
      font-size: 34px;
      font-weight: bold;
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 28px;
      font-weight: bold;
    }

    nav a:hover {
      color: #d4af37;
    }

    .profile-section {
      min-height: calc(100vh - 80px);
      background:
        linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.92)),
        url("../assets/images/golden.jpg");
      background-size: cover;
      background-position: center;
      padding: 70px 20px;
    }

    .profile-card {
      max-width: 850px;
      margin: auto;
      background: rgba(25,25,25,.96);
      border: 1px solid #d4af37;
      border-radius: 16px;
      padding: 45px;
      box-shadow: 0 0 30px rgba(212,175,55,.22);
      text-align: center;
    }

    h1, h2 {
      color: #d4af37;
    }

    .user-box {
      background: #222;
      border-radius: 12px;
      padding: 25px;
      margin: 25px 0;
      border-left: 5px solid #d4af37;
    }

    .history-card {
      background: #222;
      padding: 20px;
      border-radius: 12px;
      margin-top: 18px;
      text-align: left;
      border-left: 5px solid #d4af37;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-gold {
      background: #d4af37;
      color: #111;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: .3s;
    }

    .btn-gold:hover {
      background: #b8962f;
      color: #111;
      transform: scale(1.04);
    }

    .btn-dark-custom {
      background: transparent;
      color: white;
      border: 1px solid #d4af37;
      padding: 12px 22px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: .3s;
    }

    .btn-dark-custom:hover {
      background: #d4af37;
      color: #111;
    }
  </style>
</head>

<body>

<nav>
  <a href="../index.html" class="logo">GALORÉ</a>
  <div>
    <a href="../index.html">HOME</a>
    <a href="gallery.html">GALLERY</a>
    <a href="upload_artwork.html">UPLOAD</a>
    <a href="artist_dashboard.html">ARTIST</a>
    <a href="admin.html">ADMIN</a>
  </div>
</nav>

<section class="profile-section">
  <div class="profile-card">

    <h1>Welcome to GALORÉ</h1>
    <p>Your personal marketplace space for managing activity and purchases.</p>

    <div class="user-box">
      <h3 id="user-name"></h3>
      <p id="user-email"></p>
      <p id="user-role"></p>
    </div>

    <h2>Purchase History</h2>

    <div id="orders-container">
      <div class="history-card">
        <strong>Golden Echoes</strong><br>
        Price: 1850.00 €<br>
        Status: Completed
      </div>
    </div>

    <div class="actions">
      <a href="artist_dashboard.html" class="btn-gold">Artist Dashboard</a>
      <a href="admin.html" class="btn-dark-custom">Admin Panel</a>
      <a href="upload_artwork.html" class="btn-dark-custom">Upload Artwork</a>
      <button class="btn-gold" onclick="logout()">Logout</button>
    </div>

  </div>
</section>

<script>
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "login.html";
  }

  document.getElementById("user-name").innerText = user.name || "User";
  document.getElementById("user-email").innerText = user.email || "";
  document.getElementById("user-role").innerText = "Role: " + (user.role || "USER");

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
