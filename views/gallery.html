<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gallery – Galoré</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: #111;
      color: #fff;
    }

    nav {
      height: 80px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #111;
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 30px;
      font-weight: bold;
    }

    .gallery-header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .gallery-header h1 {
      font-size: 48px;
      color: #d4af37;
    }

    #search {
      width: 350px;
      padding: 12px;
      border: 1px solid #d4af37;
      background: #222;
      color: white;
      border-radius: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      padding: 40px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #d4af37;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(212,175,55,.18);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-body {
      padding: 20px;
    }

    .price {
      color: #d4af37;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #d4af37;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-box {
      background: #fff;
      color: #222;
      width: 520px;
      max-width: 90%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid #ddd;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 26px;
    }

    .close-x {
      font-size: 34px;
      cursor: pointer;
      color: #777;
    }

    .modal-body {
      text-align: center;
      padding: 25px;
    }

    .modal-body img {
      width: 100%;
      max-height: 330px;
      object-fit: cover;
      border-radius: 8px;
    }

    .modal-price {
      margin-top: 18px;
      font-size: 26px;
      font-weight: bold;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 22px;
      border-top: 1px solid #ddd;
    }

    .modal-footer button {
      width: auto;
      padding: 12px 20px;
      margin-top: 0;
    }

    .close-btn {
      background: #6c757d;
      color: #fff;
    }

    .purchase-btn {
      background: #d4af37;
      color: #fff;
    }
  </style>
</head>

<body>

<nav>
  <a href="../index.html" class="logo">GALORÉ</a>
  <div>
    <a href="../index.html">HOME</a>
    <a href="gallery.html">GALLERY</a>
    <a href="upload_artwork.html">UPLOAD</a>
    <a href="profile.html">PROFILE</a>
  </div>
</nav>

<div class="gallery-header">
  <h1>Gallery</h1>
  <input type="text" id="search" placeholder="Search artworks..." />
</div>

<div class="grid" id="gallery"></div>

<div class="modal-overlay" id="artworkModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <span class="close-x" onclick="closeModal()">&times;</span>
    </div>

    <div class="modal-body">
      <img id="modalImage" src="" alt="Artwork" />
      <div class="modal-price" id="modalPrice"></div>
    </div>

    <div class="modal-footer">
      <button class="close-btn" onclick="closeModal()">Close</button>
      <button class="purchase-btn" onclick="purchaseArtwork()">Purchase</button>
    </div>
  </div>
</div>

<script>
let artworks = [
  {
    id: 1,
    title: "Golden Echoes",
    description: "A luxurious artwork inspired by golden tones and timeless elegance.",
    price: 250,
    imageUrl: "../assets/images/golden.jpg"
  },
  {
    id: 2,
    title: "Eternity",
    description: "A deep visual expression of emotion, memory, and artistic silence.",
    price: 320,
    imageUrl: "../assets/images/eternity.jpg"
  },
  {
    id: 3,
    title: "Nordic Silence",
    description: "A calm and minimal piece inspired by northern landscapes.",
    price: 180,
    imageUrl: "../assets/images/nordicsilence.webp"
  }
];

let selectedArtwork = null;

function displayArtworks(items) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  if (items.length === 0) {
    gallery.innerHTML = "<p>No artworks found.</p>";
    return;
  }

  items.forEach(art => {
    gallery.innerHTML += `
      <div class="card">
        <img src="${art.imageUrl}" alt="${art.title}">
        <div class="card-body">
          <h3>${art.title}</h3>
          <p>${art.description}</p>
          <p class="price">${art.price}.00 €</p>
          <button onclick="openModal(${art.id})">View Details</button>
        </div>
      </div>
    `;
  });
}

function openModal(id) {
  selectedArtwork = artworks.find(art => art.id === id);

  document.getElementById("modalTitle").innerText = selectedArtwork.title;
  document.getElementById("modalImage").src = selectedArtwork.imageUrl;
  document.getElementById("modalPrice").innerText = selectedArtwork.price + ".00 €";

  document.getElementById("artworkModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("artworkModal").style.display = "none";
}

function purchaseArtwork() {
  if (!selectedArtwork) return;

  alert("Purchase successful! You purchased: " + selectedArtwork.title);
  closeModal();
}

document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = artworks.filter(art =>
    art.title.toLowerCase().includes(value) ||
    art.description.toLowerCase().includes(value)
  );

  displayArtworks(filtered);
});

displayArtworks(artworks);
</script>

</body>
</html>
