<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – GALORÉ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: #111;
      color: white;
    }

    nav {
      height: 80px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .logo {
      color: #111;
      font-size: 34px;
      font-weight: bold;
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 25px;
      font-weight: bold;
    }

    .checkout-section {
      min-height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
      background:
        linear-gradient(rgba(0,0,0,.82), rgba(0,0,0,.88)),
        url("assets/images/golden.jpg");

      background-size: cover;
      background-position: center;
    }

    .checkout-box {
      width: 100%;
      max-width: 700px;
      background: rgba(20,20,20,.95);
      border: 1px solid #d4af37;
      border-radius: 14px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(212,175,55,.25);
    }

    h1 {
      color: #d4af37;
      text-align: center;
      margin-bottom: 30px;
    }

    .summary {
      background: #1d1d1d;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .summary h3 {
      color: #d4af37;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background: #222;
      border: 1px solid #d4af37;
      color: white;
      border-radius: 6px;
    }

    .row-flex {
      display: flex;
      gap: 15px;
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      background: #d4af37;
      border: none;
      color: #111;
      font-weight: bold;
      font-size: 18px;
      border-radius: 8px;
      transition: .3s;
    }

    .pay-btn:hover {
      background: #b8962f;
      transform: scale(1.02);
    }

    .secure-text {
      text-align: center;
      margin-top: 15px;
      color: #bbb;
      font-size: 14px;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="logo">GALORÉ</a>

  <div>
    <a href="index.html">HOME</a>
    <a href="views/gallery.html">GALLERY</a>
    <a href="views/profile.html">PROFILE</a>
  </div>
</nav>

<section class="checkout-section">

  <div class="checkout-box">

    <h1>Secure Checkout</h1>

    <div class="summary">
      <h3>Order Summary</h3>
      <p><strong>Artwork:</strong> <span id="artwork-name"></span></p>
      <p><strong>Price:</strong> <span id="artwork-price"></span></p>
      <p><strong>Shipping:</strong> Free</p>
      <hr>
      <h4>Total: <span id="artwork-total"></span></h4>
    </div>

    <form id="payment-form">

      <input type="text" placeholder="Full Name" required>

      <input type="email" placeholder="Email Address" required>

      <input type="text" placeholder="Card Number" maxlength="16" required>

      <div class="row-flex">
        <input type="text" placeholder="MM/YY" required>
        <input type="text" placeholder="CVV" maxlength="3" required>
      </div>

      <input type="text" placeholder="Billing Address" required>

      <button type="submit" class="pay-btn">
        Complete Payment
      </button>

    </form>

    <p class="secure-text">
      🔒 Secure SSL encrypted payment powered by GALORÉ
    </p>

    <script>
    const artwork = JSON.parse(
    localStorage.getItem("selectedArtwork")
    );

    if (artwork) {
      document.getElementById("artwork-name").textContent = artwork.title;

      const cleanPrice = artwork.price.replaceAll("€", "").trim() + " €";

    document.getElementById("artwork-price").textContent = cleanPrice;
    document.getElementById("artwork-total").textContent = cleanPrice;
    }
    </script>

  </div>

</section>

<script>
document.getElementById("payment-form").addEventListener("submit", function(e) {
  e.preventDefault();

  alert("Payment successful! Thank you for your purchase.");

  localStorage.removeItem("selectedArtwork");

  window.location.href = "index.html";
});
</script>

</body>
</html>
