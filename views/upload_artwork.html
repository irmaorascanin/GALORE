<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Artwork – Galoré</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: #111;
      color: #fff;
    }

    nav {
      height: 80px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #111;
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 30px;
      font-weight: bold;
    }

    .section {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.9));
    }

    .form-box {
      width: 450px;
      background: #1b1b1b;
      border: 1px solid #d4af37;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(212,175,55,.25);
    }

    h1 {
      text-align: center;
      color: #d4af37;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #222;
      border: 1px solid #d4af37;
      color: white;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #d4af37;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">GALORÉ</a>
  <div>
    <a href="index.html">HOME</a>
    <a href="gallery.html">GALLERY</a>
    <a href="profile.html">PROFILE</a>
  </div>
</nav>

<section class="section">
  <div class="form-box">
    <h1>Upload Artwork</h1>

    <form id="artwork-form">
      <input type="text" id="title" placeholder="Artwork title" required />
      <textarea id="description" placeholder="Description"></textarea>
      <input type="text" id="imageUrl" placeholder="Image URL" required />
      <input type="number" id="price" placeholder="Price" required />
      <button type="submit">Upload</button>
    </form>
  </div>
</section>

<script>
const API_URL = "https://galore.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

document.getElementById("artwork-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const artwork = {
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    imageUrl: document.getElementById("imageUrl").value,
    price: Number(document.getElementById("price").value)
  };

  const response = await fetch(`${API_URL}/api/artworks`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify(artwork)
  });

  const data = await response.json();

  if (response.ok) {
    alert("Artwork uploaded successfully!");
    window.location.href = "gallery.html";
  } else {
    alert(data.error || "Upload failed. Make sure artist profile exists.");
  }
});
</script>

</body>
</html>
