<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gallery – Galoré</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: #111;
      color: #fff;
    }

    nav {
      height: 80px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #111;
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 30px;
      font-weight: bold;
    }

    .gallery-header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .gallery-header h1 {
      font-size: 48px;
      color: #d4af37;
    }

    #search {
      width: 350px;
      padding: 12px;
      border: 1px solid #d4af37;
      background: #222;
      color: white;
      border-radius: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      padding: 40px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #d4af37;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(212,175,55,.18);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-body {
      padding: 20px;
    }

    .price {
      color: #d4af37;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #d4af37;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">GALORÉ</a>
  <div>
    <a href="index.html">HOME</a>
    <a href="gallery.html">GALLERY</a>
    <a href="upload-artwork.html">UPLOAD</a>
    <a href="profile.html">PROFILE</a>
  </div>
</nav>

<div class="gallery-header">
  <h1>Gallery</h1>
  <input type="text" id="search" placeholder="Search artworks..." />
</div>

<div class="grid" id="gallery"></div>

<script>
const API_URL = "https://galore.onrender.com";
let artworks = [];

async function loadArtworks() {
  const response = await fetch(`${API_URL}/api/artworks`);
  artworks = await response.json();
  displayArtworks(artworks);
}

function displayArtworks(items) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  if (items.length === 0) {
    gallery.innerHTML = "<p>No artworks found.</p>";
    return;
  }

  items.forEach(art => {
    gallery.innerHTML += `
      <div class="card">
        <img src="${art.imageUrl}" alt="${art.title}">
        <div class="card-body">
          <h3>${art.title}</h3>
          <p>${art.description || ""}</p>
          <p class="price">$${art.price}</p>
          <button onclick="buyArtwork('${art.id}')">Buy Artwork</button>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = artworks.filter(art =>
    art.title.toLowerCase().includes(value)
  );
  displayArtworks(filtered);
});

function buyArtwork(id) {
  alert("Artwork purchased successfully!");
}

loadArtworks();
</script>

</body>
</html>
